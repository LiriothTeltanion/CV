<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="500" viewBox="0 0 1600 500" role="img" aria-labelledby="title description">
  <title id="title">Kevin Cusnir multilingual professional CV banner</title>
  <desc id="description">Recruiter-first blue banner for Kevin Cusnir and the Lirioth Teltanion creative identity, with English, Spanish and Hebrew role descriptions and the KC star LT signature.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#071426" />
      <stop offset="0.52" stop-color="#0b2342" />
      <stop offset="1" stop-color="#071b34" />
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#57d5ff" />
      <stop offset="0.55" stop-color="#3b82f6" />
      <stop offset="1" stop-color="#8b5cf6" />
    </linearGradient>
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#3b82f6" stop-opacity="0.35" />
      <stop offset="1" stop-color="#3b82f6" stop-opacity="0" />
    </radialGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#7dd3fc" stroke-opacity="0.08" />
    </pattern>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="7" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect width="1600" height="500" rx="34" fill="url(#background)" />
  <rect x="1.5" y="1.5" width="1597" height="497" rx="32.5" fill="none" stroke="#6bdcff" stroke-opacity="0.55" stroke-width="3" />
  <rect width="1600" height="500" rx="34" fill="url(#grid)" />
  <circle cx="1322" cy="232" r="258" fill="url(#halo)" />
  <path d="M0 404C260 342 444 466 710 404C968 344 1112 370 1600 284V500H0Z" fill="#38bdf8" fill-opacity="0.055" />
  <path d="M0 426C280 364 468 484 736 424C1000 366 1202 392 1600 320" fill="none" stroke="url(#accent)" stroke-opacity="0.4" stroke-width="2" />

  <g font-family="Segoe UI, Arial, sans-serif">
    <rect x="74" y="56" width="360" height="42" rx="21" fill="#0f3158" stroke="#5ed7ff" stroke-opacity="0.65" />
    <text x="254" y="84" fill="#c9f2ff" font-size="17" font-weight="700" letter-spacing="2.1" text-anchor="middle">MULTILINGUAL CV · EN / ES / HE</text>

    <text x="74" y="178" fill="#ffffff" font-size="65" font-weight="760" letter-spacing="-1.8">Kevin Cusnir</text>
    <text x="78" y="225" fill="url(#accent)" font-size="31" font-weight="650" letter-spacing="1.6">Lirioth Teltanion</text>

    <text x="78" y="286" fill="#e7f6ff" font-size="25" font-weight="620">Junior Frontend &amp; Full-Stack Developer · Creative Technologist</text>
    <text x="78" y="326" fill="#bfdbfe" font-size="22">Desarrollador Frontend y Full-Stack Junior · Tecnólogo creativo</text>
    <text x="78" y="366" fill="#bfdbfe" font-size="22">מפתח Frontend ו-Full-Stack ג׳וניור · טכנולוג יצירתי</text>

    <g font-size="17" font-weight="700" text-anchor="middle">
      <rect x="76" y="411" width="114" height="42" rx="21" fill="#0f3158" stroke="#3b82f6" />
      <text x="133" y="438" fill="#eaf7ff">React</text>
      <rect x="204" y="411" width="142" height="42" rx="21" fill="#0f3158" stroke="#3b82f6" />
      <text x="275" y="438" fill="#eaf7ff">TypeScript</text>
      <rect x="360" y="411" width="122" height="42" rx="21" fill="#0f3158" stroke="#3b82f6" />
      <text x="421" y="438" fill="#eaf7ff">Python</text>
      <rect x="496" y="411" width="92" height="42" rx="21" fill="#0f3158" stroke="#3b82f6" />
      <text x="542" y="438" fill="#eaf7ff">SQL</text>
      <rect x="602" y="411" width="150" height="42" rx="21" fill="#0f3158" stroke="#3b82f6" />
      <text x="677" y="438" fill="#eaf7ff">Accessible UX</text>
    </g>

    <g transform="translate(1120 122)">
      <circle cx="184" cy="108" r="142" fill="#061326" fill-opacity="0.7" stroke="#4ccdf4" stroke-opacity="0.48" stroke-width="2" />
      <circle cx="184" cy="108" r="114" fill="none" stroke="#60a5fa" stroke-opacity="0.32" stroke-width="1.5" />
      <path d="M184 -20V236M56 108H312" stroke="#38bdf8" stroke-opacity="0.14" />
      <text x="101" y="124" fill="#eaf8ff" font-size="55" font-family="Segoe Script, Segoe UI, cursive" font-style="italic" font-weight="700">KC</text>
      <g transform="translate(184 108)" filter="url(#glow)">
        <path d="M0 -28L7 -7L28 0L7 7L0 28L-7 7L-28 0L-7 -7Z" fill="#75dcff" />
        <circle r="5" fill="#ffffff" />
      </g>
      <text x="212" y="124" fill="#eaf8ff" font-size="55" font-family="Segoe Script, Segoe UI, cursive" font-style="italic" font-weight="700">LT</text>
      <text x="184" y="182" fill="#9ddfff" font-size="14" font-weight="700" letter-spacing="3" text-anchor="middle">CODE · CRAFT · CLARITY</text>
    </g>

    <text x="1526" y="456" fill="#a7c7df" font-size="17" text-anchor="end">San Cristóbal, Venezuela → Beersheba, Israel</text>
  </g>
</svg>
